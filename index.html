<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pluie de Smileys 🌈</title>
    <style>
        /* ----- RESET ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* ----- FOND ARC-EN-CIEL ----- */
        #container {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff6b6b, #ffa94d, #ffd43b, #69db7c, #4dabf7, #9775fa, #ff6b6b);
            background-size: 400% 400%;
            animation: rainbow 8s ease infinite;
            position: relative;
            overflow: hidden;
        }

        @keyframes rainbow {
            0%   { background-position: 0% 50%; }
            25%  { background-position: 100% 0%; }
            50%  { background-position: 100% 100%; }
            75%  { background-position: 0% 100%; }
            100% { background-position: 0% 50%; }
        }

        /* ----- TITRE ----- */
        #title {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: clamp(1.5rem, 5vw, 3rem);
            color: #fff;
            text-shadow: 0 2px 12px rgba(0,0,0,0.35);
            pointer-events: none;
            z-index: 10;
            letter-spacing: 2px;
        }

        /* ----- SMILEY ----- */
        .smiley-wrapper {
            position: absolute;
            top: -80px;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .smiley {
            user-select: none;
            pointer-events: auto;
            cursor: pointer;
            will-change: transform;
            line-height: 1;
            transition: transform 0.25s ease, filter 0.25s ease;
        }

        .smiley:hover {
            transform: scale(1.6) !important;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.8));
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="title">🌈 Pluie de Smileys 🌈</div>
    </div>

    <script>
        (function() {
            'use strict';

            const container = document.getElementById('container');

            // Collection de smileys variés
            const EMOJIS = [
                '😀', '😎', '😂', '🤩', '😍', '🥳', '😜', '🤪',
                '😏', '😇', '🥰', '😋', '🤗', '😺', '😸', '🙃',
                '😈', '🤓', '🥸', '😤', '😴', '🤠', '🥺', '😱',
                '🎉', '⭐', '💫', '✨', '🎊', '🌟', '💥', '🔥'
            ];

            // Dimensions mises en cache
            let winW = window.innerWidth;
            let winH = window.innerHeight;

            function updateDimensions() {
                winW = window.innerWidth;
                winH = window.innerHeight;
            }
            window.addEventListener('resize', updateDimensions);

            // --- Création d'un smiley ---
            function createSmiley() {
                // Wrapper : gère la chute (translateY)
                const wrapper = document.createElement('div');
                wrapper.className = 'smiley-wrapper';

                // Élément smiley : gère la rotation + dérive (translateX)
                const el = document.createElement('div');
                el.className = 'smiley';

                const emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
                const size = 20 + Math.random() * 50;          // 20 – 70 px
                const duration = 4 + Math.random() * 6;         // 4 – 10 s
                const startX = Math.random() * winW;
                const rotation = Math.random() * 360;
                const drift = -40 + Math.random() * 80;         // dérive X totale
                const opacity = 0.5 + Math.random() * 0.5;      // 0.5 – 1.0

                el.textContent = emoji;
                el.style.fontSize = size + 'px';
                el.style.opacity = opacity;
                el.style.transform = `rotate(${rotation}deg)`;

                wrapper.style.left = startX + 'px';

                wrapper.appendChild(el);
                container.appendChild(wrapper);

                // Animation de chute sur le wrapper (translateY uniquement)
                const fall = wrapper.animate(
                    [
                        { transform: `translateY(0px)` },
                        { transform: `translateY(${winH + 150}px)` }
                    ],
                    {
                        duration: duration * 1000,
                        easing: 'ease-in',
                        fill: 'forwards'
                    }
                );

                // Dérive horizontale + rotation sur l'élément intérieur
                const wobble = el.animate(
                    [
                        { transform: `rotate(${rotation}deg) translateX(0px)` },
                        { transform: `rotate(${rotation + 60}deg) translateX(${drift}px)` },
                        { transform: `rotate(${rotation + 120}deg) translateX(0px)` }
                    ],
                    {
                        duration: duration * 1000,
                        easing: 'ease-in-out',
                        fill: 'forwards'
                    }
                );

                // Hover : change l'emoji temporairement
                el.addEventListener('mouseenter', () => {
                    const hoverEmoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
                    el.textContent = hoverEmoji;
                    // Accélère la chute
                    fall.playbackRate = 2.5;
                    wobble.playbackRate = 2.5;
                });

                el.addEventListener('mouseleave', () => {
                    el.textContent = emoji;
                    fall.playbackRate = 1;
                    wobble.playbackRate = 1;
                });

                // Nettoyage après la fin de l'animation
                fall.onfinish = () => {
                    wrapper.remove();
                };
            }

            // --- Génération continue ---
            let spawnInterval = 300; // ms

            function startRain() {
                createSmiley();
                // Ajuste l'intervalle dynamiquement : plus de monde → plus lent
                const count = container.querySelectorAll('.smiley').length;
                const base = 150;
                const max = 600;
                const target = Math.min(max, base + count * 8);
                spawnInterval = Math.max(80, target);

                setTimeout(startRain, spawnInterval);
            }

            // Lancement au chargement
            window.addEventListener('load', () => {
                // Petite salve initiale
                for (let i = 0; i < 20; i++) {
                    setTimeout(() => createSmiley(), i * 80);
                }
                // Démarre la pluie continue
                setTimeout(startRain, 500);
            });

            // Clic sur le container pour ajouter des smileys !
            container.addEventListener('click', (e) => {
                if (e.target === container || e.target.id === 'title') {
                    for (let i = 0; i < 5; i++) {
                        setTimeout(() => {
                            const wrapper = document.createElement('div');
                            wrapper.className = 'smiley-wrapper';
                            const el = document.createElement('div');
                            el.className = 'smiley';

                            const emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
                            el.textContent = emoji;
                            const size = (20 + Math.random() * 40);
                            el.style.fontSize = size + 'px';
                            el.style.opacity = '0.9';
                            const rot = Math.random() * 360;
                            el.style.transform = `rotate(${rot}deg) scale(0)`;

                            wrapper.style.left = (e.clientX + (Math.random() - 0.5) * 120) + 'px';
                            wrapper.style.top = (e.clientY + (Math.random() - 0.5) * 120) + 'px';
                            wrapper.style.position = 'absolute';

                            wrapper.appendChild(el);
                            container.appendChild(wrapper);

                            // Apparition avec effet "pop"
                            el.animate(
                                [
                                    { transform: `rotate(${rot}deg) scale(0)`, opacity: 0 },
                                    { transform: `rotate(${rot}deg) scale(1)`, opacity: 1 }
                                ],
                                { duration: 400, easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)', fill: 'forwards' }
                            );

                            // Puis chute normale
                            setTimeout(() => {
                                const fallDuration = 4 + Math.random() * 6;
                                const fall = wrapper.animate(
                                    [
                                        { transform: `translateY(0px)`, opacity: 1 },
                                        { transform: `translateY(${winH + 100}px)`, opacity: 0 }
                                    ],
                                    { duration: fallDuration * 1000, easing: 'ease-in', fill: 'forwards' }
                                );
                                fall.onfinish = () => wrapper.remove();
                            }, 600);
                        }, i * 60);
                    }
                }
            });

        })();
    </script>
</body>
</html>
